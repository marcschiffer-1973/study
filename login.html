<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TU Berlin Study Portal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Study Portal" />
  <meta name="theme-color" content="#c0392b" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #c0392b;
      --dark:   #1a1a1a;
      --gray:   #4a4a4a;
      --light:  #f5f5f5;
      --border: #ddd;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .tu-badge {
      background: var(--red);
      color: #fff;
      font-size: .85rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 5px;
      letter-spacing: .04em;
    }

    .logo-text {
      font-size: .95rem;
      font-weight: 700;
      color: var(--dark);
    }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    .form-body {
      padding: 2rem;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .form-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: .3rem;
    }

    .form-subtitle {
      font-size: .83rem;
      color: var(--gray);
      margin-bottom: 1.6rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: .35rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .92rem;
      color: var(--dark);
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }

    input:focus {
      border-color: var(--red);
    }

    .btn {
      width: 100%;
      padding: .75rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s, transform .1s;
    }

    .btn:hover { background: #a93226; }
    .btn:active { transform: scale(.98); }

    .error-msg {
      background: #fdf0f0;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 7px;
      padding: .65rem .9rem;
      font-size: .83rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      border-radius: 7px;
      padding: .65rem .9rem;
      font-size: .83rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-msg.show { display: block; }

    .hint {
      font-size: .78rem;
      color: #aaa;
      text-align: center;
      margin-top: 1.2rem;
    }

    footer {
      margin-top: 2rem;
      font-size: .78rem;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <a class="logo" href="#">
    <span class="tu-badge">TU</span>
    <span class="logo-text">MSc Information System Management</span>
  </a>

  <div class="card">
    <div class="form-body">

      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <div class="form-title">Welcome back, Marc</div>
        <div class="form-subtitle">Sign in to your study portal</div>

        <div class="error-msg" id="login-error"></div>

        <div class="field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" />
        </div>
        <button class="btn" onclick="doLogin()">Sign In</button>
      </div>

    </div>
  </div>

  <footer>TU Berlin Study Portal &nbsp;·&nbsp; Data stored locally in your browser</footer>

  <script>
    // ── If already logged in, go straight to dashboard ──
    if (sessionStorage.getItem('ism_user')) {
      window.location.href = 'index.html';
    }

    function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const err      = document.getElementById('login-error');

      err.classList.remove('show');

      if (!username) { err.textContent = 'Please enter your username.'; err.classList.add('show'); return; }

      if (username.toLowerCase() !== 'marc') {
        err.textContent = 'Incorrect username.';
        err.classList.add('show');
        return;
      }

      sessionStorage.setItem('ism_user', JSON.stringify({ name: 'Marc' }));
      window.location.href = 'index.html';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
